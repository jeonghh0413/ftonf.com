<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ft.onf - Running Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }
        .logo { font-size: 3rem; font-weight: 700; margin-bottom: 0.5rem; }
        .logo span { color: #6C63FF; }
        .tagline { font-size: 1.2rem; color: #888; margin-bottom: 2rem; }
        .links { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; }
        .links a {
            color: #6C63FF;
            text-decoration: none;
            font-size: 0.95rem;
            padding: 0.5rem 1rem;
            border: 1px solid #333;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .links a:hover { background: #6C63FF; color: #fff; }
        footer {
            position: fixed;
            bottom: 2rem;
            color: #555;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">ft.<span>onf</span></div>
        <p class="tagline">Your Running Companion</p>
        <div class="links">
            <a href="/privacy">Privacy Policy</a>
            <a href="mailto:jeonghh0413@gmail.com">Contact</a>
        </div>
    </div>
    <footer>&copy; 2026 ft.onf. All rights reserved.</footer>
</body>
</html>
